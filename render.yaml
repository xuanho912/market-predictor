services:
  - type: web
    name: market-predictor-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: ENVIRONMENT
        value: production
      - key: ALLOW_TRADING
        value: "false"
      - key: PREDICTION_DB_PATH
        value: /tmp/market-predictor/market_predictor.sqlite
      - key: PREDICTION_STORE_PATH
        value: /tmp/market-predictor/predictions
      - key: FEATURE_STORE_PATH
        value: /tmp/market-predictor/features
      - key: MODEL_REGISTRY_PATH
        value: /tmp/market-predictor/models
      - key: MARKET_DATA_CACHE_DIR
        value: /tmp/market-predictor/market_data_cache
      - key: ALPHA_OUTPUT_DIR
        value: /tmp/market-predictor/outputs
      - key: FORWARD_TRACKER_UTC_HOUR
        value: "22"
      - key: FORWARD_TRACKER_UTC_MINUTE
        value: "30"
