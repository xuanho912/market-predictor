services:
  - type: web
    name: market-predictor-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: ENVIRONMENT
        value: production
      - key: ALLOW_TRADING
        value: "false"
      - key: PREDICTION_DB_PATH
        value: /var/data/market_predictor.sqlite
      - key: PREDICTION_STORE_PATH
        value: /var/data/predictions
      - key: FEATURE_STORE_PATH
        value: /var/data/features
      - key: MODEL_REGISTRY_PATH
        value: /var/data/models
      - key: MARKET_DATA_CACHE_DIR
        value: /var/data/market_data_cache
      - key: ALPHA_OUTPUT_DIR
        value: /var/data/outputs
      - key: FORWARD_TRACKER_UTC_HOUR
        value: "22"
      - key: FORWARD_TRACKER_UTC_MINUTE
        value: "30"
    disk:
      name: market-predictor-data
      mountPath: /var/data
      sizeGB: 1
