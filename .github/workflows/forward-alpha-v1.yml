name: Forward Alpha v1 Observation

on:
  workflow_dispatch:
    inputs:
      event_refresh:
        description: "Refresh news/event intelligence after a major event without appending a new baseline forecast record"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/forward-alpha-v1.yml"
      - "scripts/providers/fred_provider.py"
      - "scripts/providers/breadth_provider.py"
      - "scripts/providers/options_provider.py"
      - "scripts/providers/flow_provider.py"
      - "scripts/providers/flow_positioning_provider.py"
      - "scripts/providers/news_event_provider.py"
      - "scripts/forecast_accuracy_ledger.py"
      - "scripts/forecast_price_levels.py"
      - "scripts/price_volume_structure.py"
      - "scripts/confluence_engine.py"
      - "scripts/market_alert_engine.py"
      - "scripts/historical_replay_benchmark.py"
      - "scripts/model_challenger_framework.py"
      - "scripts/export_static_alpha_v1.py"
      - "scripts/market_intelligence_v3.py"
      - "scripts/market_intelligence_v4.py"
      - "frontend/app/**"
      - "frontend/components/**"
      - "frontend/lib/**"
      - "frontend/package.json"
      - "frontend/tailwind.config.ts"
      - "frontend/postcss.config.js"
  schedule:
    - cron: "37 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  run-forward-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALPHA_OUTPUT_DIR: outputs
      PREDICTION_DB_PATH: data/market_predictor.sqlite
      PREDICTION_STORE_PATH: data/predictions
      FEATURE_STORE_PATH: data/features
      MODEL_REGISTRY_PATH: data/models
      MARKET_DATA_CACHE_DIR: data/market_data_cache
      FINNHUB_CACHE_DIR: data/finnhub_cache
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_CACHE_DIR: data/fred_cache
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      BREADTH_CACHE_DIR: data/breadth_cache
      NEWS_EVENT_CACHE_DIR: data/news_event_cache
      EVENT_REFRESH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.event_refresh == 'true' && 'true' || 'false' }}
      PUBLIC_DASHBOARD_REPO: ${{ vars.PUBLIC_DASHBOARD_REPO }}
      PUBLIC_DASHBOARD_BRANCH: ${{ vars.PUBLIC_DASHBOARD_BRANCH || 'main' }}
      PUBLIC_DASHBOARD_BASE_PATH: ${{ vars.PUBLIC_DASHBOARD_BASE_PATH || '/market-predictor' }}
      ALLOW_TRADING: "false"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      PYTHONPATH: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --disable-pip-version-check --progress-bar off -r backend/requirements.txt

      - name: Restore breadth provider cache
        uses: actions/cache@v4
        with:
          path: data/breadth_cache
          key: breadth-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            breadth-cache-${{ runner.os }}-

      - name: Run frozen Alpha v1 forward-only tracker
        run: python -m app.services.validation.forward_alpha_tracker

      - name: Export static frontend fallback data
        run: python scripts/export_static_alpha_v1.py

      - name: Commit updated forward observation outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/forward_alpha_v1_daily_checks.csv outputs/forward_alpha_v1_signals.csv outputs/forward_alpha_v1_report.md outputs/fred_data_status.md outputs/breadth_data_status.md outputs/options_data_status.md outputs/flow_data_status.md outputs/flow_positioning_status.md outputs/news_event_status.md outputs/breadth_impact_report.md outputs/forecast_price_levels.md outputs/price_volume_structure.md outputs/confluence_score.md outputs/market_alerts.md outputs/high_confidence_signal_report.md outputs/high_confidence_edge_report.md outputs/forecast_records.csv outputs/forecast_accuracy_scorecard.md outputs/historical_replay_benchmark.md outputs/model_challenger_forecasts.csv outputs/model_leaderboard.md outputs/model_promotion_rules.md frontend/public/alpha-v1-status.json frontend/public/alpha-v1-analogs.json frontend/public/data_quality_report.json frontend/public/breadth-status.json frontend/public/options-status.json frontend/public/flow-status.json frontend/public/flow-positioning-status.json frontend/public/news-event-status.json frontend/public/breadth-impact-report.json frontend/public/forecast-price-levels.json frontend/public/price-volume-structure.json frontend/public/confluence-score.json frontend/public/market-alerts.json frontend/public/high-confidence-signal-report.json frontend/public/high-confidence-edge-report.json frontend/public/forecast-records.json frontend/public/forecast-accuracy-scorecard.json frontend/public/historical-replay-benchmark.json frontend/public/model-challenger-forecasts.json frontend/public/model-leaderboard.json frontend/public/model-promotion-status.json frontend/public/market-overview.json frontend/public/simulated-paths.json frontend/public/prediction-dashboard.json
          if git diff --cached --quiet; then
            echo "No forward observation output changes to commit."
          else
            git commit -m "Update Alpha v1 forward observation outputs"
            git push
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore frontend dependency and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/.next/cache
          key: frontend-cache-${{ runner.os }}-${{ hashFiles('frontend/package.json', 'frontend/tailwind.config.ts', 'frontend/postcss.config.js', 'frontend/app/**/*', 'frontend/components/**/*', 'frontend/lib/**/*') }}
          restore-keys: |
            frontend-cache-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --prefer-offline --no-audit --no-fund --loglevel=error

      - name: Build GitHub Pages static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          PUBLIC_DASHBOARD_BASE_PATH: ${{ env.PUBLIC_DASHBOARD_BASE_PATH }}
          NEXT_PUBLIC_BASE_PATH: ${{ env.PUBLIC_DASHBOARD_BASE_PATH }}
        run: npm run build

      - name: Export sanitized public dashboard bundle
        run: python scripts/export_public_dashboard_bundle.py --source frontend/out --dest outputs/public_dashboard_site

      - name: Publish sanitized dashboard to public repository
        if: ${{ env.PUBLIC_DASHBOARD_REPO != '' }}
        env:
          DASHBOARD_DEPLOY_TOKEN: ${{ secrets.DASHBOARD_DEPLOY_TOKEN }}
        run: |
          if [ -z "$DASHBOARD_DEPLOY_TOKEN" ]; then
            echo "::warning::PUBLIC_DASHBOARD_REPO is set but DASHBOARD_DEPLOY_TOKEN is missing. Skipping public dashboard publish."
            exit 0
          fi
          rm -rf /tmp/market-predictor-dashboard-publish
          git clone --depth 1 --branch "$PUBLIC_DASHBOARD_BRANCH" "https://x-access-token:${DASHBOARD_DEPLOY_TOKEN}@github.com/${PUBLIC_DASHBOARD_REPO}.git" /tmp/market-predictor-dashboard-publish || \
            git clone --depth 1 "https://x-access-token:${DASHBOARD_DEPLOY_TOKEN}@github.com/${PUBLIC_DASHBOARD_REPO}.git" /tmp/market-predictor-dashboard-publish
          rsync -a --delete --exclude ".git" outputs/public_dashboard_site/ /tmp/market-predictor-dashboard-publish/
          cd /tmp/market-predictor-dashboard-publish
          git remote set-url origin "https://github.com/${PUBLIC_DASHBOARD_REPO}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public dashboard changes to publish."
          else
            git commit -m "Update generated market prediction dashboard"
            git push "https://x-access-token:${DASHBOARD_DEPLOY_TOKEN}@github.com/${PUBLIC_DASHBOARD_REPO}.git" "HEAD:${PUBLIC_DASHBOARD_BRANCH}"
          fi

      - name: Configure GitHub Pages
        if: ${{ !github.event.repository.private }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ !github.event.repository.private }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        if: ${{ !github.event.repository.private }}
        id: deployment
        uses: actions/deploy-pages@v4
