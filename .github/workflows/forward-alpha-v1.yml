name: Forward Alpha v1 Observation

on:
  workflow_dispatch:
  schedule:
    - cron: "37 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  run-forward-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALPHA_OUTPUT_DIR: outputs
      PREDICTION_DB_PATH: data/market_predictor.sqlite
      PREDICTION_STORE_PATH: data/predictions
      FEATURE_STORE_PATH: data/features
      MODEL_REGISTRY_PATH: data/models
      MARKET_DATA_CACHE_DIR: data/market_data_cache
      ALLOW_TRADING: "false"
      PYTHONPATH: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run frozen Alpha v1 forward-only tracker
        run: python -m app.services.validation.forward_alpha_tracker

      - name: Export static frontend fallback data
        run: python scripts/export_static_alpha_v1.py

      - name: Commit updated forward observation outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/forward_alpha_v1_daily_checks.csv outputs/forward_alpha_v1_signals.csv outputs/forward_alpha_v1_report.md frontend/public/alpha-v1-status.json frontend/public/alpha-v1-analogs.json frontend/public/data_quality_report.json frontend/public/market-overview.json frontend/public/simulated-paths.json frontend/public/prediction-dashboard.json
          if git diff --cached --quiet; then
            echo "No forward observation output changes to commit."
          else
            git commit -m "Update Alpha v1 forward observation outputs"
            git push
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build GitHub Pages static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
